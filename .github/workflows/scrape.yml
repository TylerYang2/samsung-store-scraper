name: Samsung Store Scraper

on:
  workflow_dispatch:        # 수동 실행

concurrency:
  group: samsung-scraper
  cancel-in-progress: false  # 중복 실행 방지 (토큰 충돌 방지)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        env:
          BOX_CLIENT_ID:     ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          BOX_REFRESH_TOKEN: ${{ secrets.BOX_REFRESH_TOKEN }}
          BOX_ACCESS_TOKEN:  ${{ secrets.BOX_ACCESS_TOKEN }}
          GH_PAT:            ${{ secrets.GH_PAT }}
          KAKAO_API_KEY:     ${{ secrets.KAKAO_API_KEY }}
        run: python samsung_stores.py
