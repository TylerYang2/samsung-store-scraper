name: Store Scraper

on:
  schedule:
    - cron: '0 21 1 * *'  # 매월 1일 오전 6시 KST (UTC 21:00 전날)
  workflow_dispatch:
    inputs:
      target:
        description: '실행할 스크래퍼'
        required: true
        default: 'carriers'
        type: choice
        options:
          - carriers
          - all
          - samsung
          - kt
          - lgu
          - skt

concurrency:
  group: store-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Clean output folder
        run: rm -rf output && mkdir output

      - name: Install dependencies
        run: |
          pip3 install --quiet requests pandas openpyxl beautifulsoup4 playwright pynacl
          python3 -m playwright install chromium --quiet

      - name: Run Samsung scraper
        if: ${{ inputs.target == 'all' || inputs.target == 'samsung' }}
        env:
          KAKAO_API_KEY: ${{ secrets.KAKAO_API_KEY }}
        run: python3 samsung_stores.py

      - name: Run KT scraper
        if: ${{ github.event_name == 'schedule' || inputs.target == 'carriers' || inputs.target == 'all' || inputs.target == 'kt' }}
        run: python3 kt_stores.py

      - name: Run LGU+ scraper
        if: ${{ github.event_name == 'schedule' || inputs.target == 'carriers' || inputs.target == 'all' || inputs.target == 'lgu' }}
        run: python3 lgu_stores.py

      - name: Run SKT scraper
        if: ${{ github.event_name == 'schedule' || inputs.target == 'carriers' || inputs.target == 'all' || inputs.target == 'skt' }}
        env:
          PYTHONUNBUFFERED: '1'
        run: python3 skt_stores.py

      - name: Upload to Box
        if: ${{ github.event_name == 'schedule' || inputs.target != 'samsung' }}
        run: python3 box_upload.py

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Store_Data
          path: output/
          retention-days: 30
